<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
 
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#4285f4">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="style.css">
  
  <title>My Weather App</title>
</head>
<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <h1 class="card-title text-center mb-4">
              <i class="bi bi-cloud-sun me-2"></i>
              Weather Now
            </h1>
            
           
            <div class="mb-4">
              <label for="locationInput" class="form-label">Location</label>
              <input type="text" class="form-control" id="locationInput" value="Cookeville, TN" placeholder="Enter city">
              <button class="btn btn-primary mt-2 w-100" id="getWeatherBtn">
                <i class="bi bi-search"></i> Get Weather
              </button>
            </div>
            
            
            <div id="weatherDisplay" class="text-center">
              
              <div class="spinner-border text-primary" id="spinner" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
              
              
              <div id="weatherData" style="display: none;">
                <h2 id="location" class="h4 mb-3">Cookeville, TN</h2>
                
               
                <div id="weatherIcon" class="display-1 mb-2">
                  <i class="bi bi-cloud-sun"></i>
                </div>
                
                <p id="conditionText" class="lead">Loading...</p>
                
                <p id="temperature" class="display-3 fw-bold text-primary">--°F</p>
                
                <p id="humidity" class="h5">
                  <i class="bi bi-droplet me-2"></i>
                  Humidity: --%
                </p>
                
                
                <p id="feelsLike" class="text-muted">
                  <i class="bi bi-thermometer-half me-1"></i>
                  Feels like: --°F
                </p>
              </div>
              
            
              <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
            </div>
          </div>
          
      
          <div class="card-footer text-center text-muted bg-transparent border-0 pb-3">
            Data provided by 
            <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer" class="text-decoration-none">
              Open-Meteo.com
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="script.js"></script>
</body>
</html>
